# mime.local.conf — local MIME-type overrides, merged on top of conf/mime.conf.
# Seeded once by entrypoint.sh (from conf-seed/); edit freely — it survives
# redeploys (it's a user file, never overwritten by the release-default sync).
#
# DokuWiki CANNOT "allow every file type" — uploads are an allowlist of
# extension→mime pairs (this file layered on the stock conf/mime.conf). Stock
# already permits images/audio/video/common archives/office docs/PDF, so this
# file broadens the allowlist with the types stock omits or comments out,
# covering essentially everything a normal wiki needs.
#
# Format:  <extension> <mime/type>
#   prefix the mime with '!' to force a download dialog (no inline view)
#   list an extension ALONE (no mime) to disable a stock type
#
# SECURITY: html/htm are intentionally NOT enabled here — uploaded HTML/JS is an
# XSS vector (https://www.dokuwiki.org/mime). The wiki is closed (login
# required), but html/htm stay off by default. To enable them you must BOTH add
# them here AND set $conf['iexssprotect'] = 0, and only if every uploader is
# fully trusted.

# --- Plain text / markup (stock comments out txt/conf/xml/csv; md isn't stock)
