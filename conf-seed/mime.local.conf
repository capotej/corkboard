# mime.local.conf — local MIME-type overrides, merged on top of conf/mime.conf.
# Seeded once by entrypoint.sh (from conf-seed/); edit freely — it survives
# redeploys (it's a user file, never overwritten by the release-default sync).
# Re-enables plain-text uploads, which the stock mime.conf omits.
# Format: <extension> <mime/type> per line.
txt     text/plain
md      text/x-markdown
