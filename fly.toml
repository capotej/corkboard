# fly.toml — DokuWiki-on-Fly.io app config (TEMPLATE).
#
# This repo is meant to be cloned, renamed, and deployed:
#   1. Clone it:   git clone <url> <your-app-name>
#   2. Edit `app = "..."` below to a globally-unique name -> https://<app>.fly.dev
#   3. Set the two required secrets (admin + agent):
#        fly secrets set CORKBOARD_ADMIN_PASS='...' CORKBOARD_AGENT_PASS='...' -a <app>
#   4. fly deploy
#
# See https://fly.io/docs/reference/configuration/ for the full schema.

app = 'corkboard-example'   # RENAME: must be globally unique across Fly.io
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'dokuwiki_data'
  destination = '/dokuwiki-persistent'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "10s"
    method = "GET"
    timeout = "2s"
    path = "/lib/tpl/dokuwiki/images/favicon.ico"   # static asset (200); / 302s to login, and Fly checks need 2xx

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
