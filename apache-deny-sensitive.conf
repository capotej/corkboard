# Block direct HTTP access to DokuWiki's sensitive directories.
# These hold page data, configuration and user credentials (users.auth.php).
# DokuWiki ships .htaccess rules for this, but enforcing it here in the Apache
# config makes the protection independent of AllowOverride / .htaccess quirks.
<Directory /var/www/html/data>
    Require all denied
</Directory>
<Directory /var/www/html/conf>
    Require all denied
</Directory>
<Directory /var/www/html/bin>
    Require all denied
</Directory>
<Directory /var/www/html/inc>
    Require all denied
</Directory>
