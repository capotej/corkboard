; OPcache tuning for fast cold starts on Fly.io.
;
; DokuWiki officially recommends opcache (https://www.dokuwiki.org/performance).
; The official php:8.2-apache image loads opcache's zend_extension via
; `docker-php-ext-install opcache`, and opcache.enable defaults to 1 — so these
; directives mostly *size* an already-loaded cache, and add a preload so the
; first request after a Fly auto-start doesn't pay for compiling DokuWiki's
; core from scratch. All build-time; zero per-boot cost.

opcache.enable=1
opcache.enable_cli=0

; 128 MiB shared memory is plenty for DokuWiki core + common plugins on a
; 512 MiB VM; 16 MiB for interned strings cuts duplicate string copies.
opcache.memory_consumption=128
opcache.interned_strings_buffer=16

; DokuWiki ships a few hundred PHP files; 7963 leaves generous headroom for
; installed plugins. (PHP rounds up to the nearest prime internally.)
opcache.max_accelerated_files=7963

; The DokuWiki Extension Manager writes plugin PHP to the volume at runtime, so
; keep timestamp validation on (recheck within 2s) — updated code takes effect
; without an Apache restart.
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; Some code introspects annotations; keep comments in the bytecode.
opcache.save_comments=1

; Preload DokuWiki's image-shipped core library at Apache startup. This shifts
; compilation off the first request and onto startup (which on Fly overlaps the
; gap between machine-up and the proxied request arriving). preload_user MUST be
; set because Apache's master process starts as root; preloading as root is
; disallowed by default. See https://www.php.net/manual/en/opcache.preloading.php
opcache.preload=/usr/local/share/dokuwiki/preload.php
opcache.preload_user=www-data
