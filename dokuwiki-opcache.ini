; OPcache tuning for fast cold starts on Fly.io.
;
; DokuWiki officially recommends opcache (https://www.dokuwiki.org/performance).
; The official php:8.2-apache image loads opcache's zend_extension via
; `docker-php-ext-install opcache`, and opcache.enable defaults to 1 — so these
; directives mostly *size* an already-loaded cache. (opcache.preload was
; enabled once and is now DISABLED — see the commented block below for why.)
; All build-time; zero per-boot cost.

opcache.enable=1
opcache.enable_cli=0

; 128 MiB shared memory is plenty for DokuWiki core + common plugins on a
; 512 MiB VM; 16 MiB for interned strings cuts duplicate string copies.
opcache.memory_consumption=128
opcache.interned_strings_buffer=16

; DokuWiki ships a few hundred PHP files; 7963 leaves generous headroom for
; installed plugins. (PHP rounds up to the nearest prime internally.)
opcache.max_accelerated_files=7963

; The DokuWiki Extension Manager writes plugin PHP to the volume at runtime, so
; keep timestamp validation on (recheck within 2s) — updated code takes effect
; without an Apache restart.
opcache.validate_timestamps=1
opcache.revalidate_freq=2

; Some code introspects annotations; keep comments in the bytecode.
opcache.save_comments=1

; opcache.preload is DISABLED on purpose.
;
; Preload COMPILES files into SHM at Apache startup WITHOUT EXECUTING them.
; Several DokuWiki files define runtime constants via a top-level define() in
; the SAME file as a class — e.g. inc/HTTP/HTTPClient.php does
; `define('HTTP_NL', "\r\n")` right beside the dokuwiki\HTTP\HTTPClient class.
; Under preload the class gets linked into SHM, but the define() never runs;
; at request time the autoloader sees the class already loaded and SKIPS
; including the file, so the constant stays undefined -> fatal
; "Undefined constant dokuwiki\HTTP\HTTP_NL" (PHP 8 errors on undefined
; constants). Same footgun lurks in other inc/ files (defines.php, init.php,
; httputils.php, parserutils.php, …). Disabling preload is the robust fix.
;
; Cost is small: with auto_stop_machines='suspend' the common path is a
; ~0.5-0.7s resume that already preserves the warm OPcache SHM, so preload only
; ever helped the rare true-cold-start first request (and opcache warms lazily
; thereafter). OPcache itself stays on below.
; opcache.preload=/usr/local/share/dokuwiki/preload.php
; opcache.preload_user=www-data
